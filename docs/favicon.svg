<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="skval">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <!-- rounded tile, dark theme with a green ring (matches the site) -->
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="7" fill="url(#tile)" stroke="#3fb950" stroke-width="1.75"/>
  <!-- score bars climbing to an A -->
  <g fill="#2ea043">
    <rect x="7"  y="18" width="3.4" height="7"  rx="1.2"/>
    <rect x="12" y="14" width="3.4" height="11" rx="1.2"/>
  </g>
  <!-- pass check sitting on the tallest bar -->
  <path d="M9 16.2 L13.8 21 L24 9.4" fill="none" stroke="#3fb950"
        stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
