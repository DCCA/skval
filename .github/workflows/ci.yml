name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with Python 3.11)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install the project + dev deps
        # setup-uv (with python-version) already created .venv and exported
        # VIRTUAL_ENV, so install straight into it — no `uv venv` needed.
        run: uv pip install -e ".[dev]"

      - name: Run the test suite
        run: .venv/bin/pytest

      - name: Skill must self-validate 100 / A / Ship
        run: |
          .venv/bin/python skills/skill-validator/scripts/validate_structural.py skills/skill-validator --out skval-self
          .venv/bin/python -c "import json; d=json.load(open('skval-self/scorecard.json')); print('self-validation:', d['score'], d['grade'], d['verdict']); assert (d['score'], d['grade'], d['verdict']) == (100, 'A', 'Ship'), 'skill self-validation regressed'"
